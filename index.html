<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Gyming己酩健身日志</title>
  <link rel="apple-touch-icon" href="icon.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.263.1"
      }
    }
  </script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { -webkit-tap-highlight-color: transparent; }
    body { background-color: #f9fafb; }
    input[type="text"], input[type="number"], textarea {
        background-color: transparent;
        outline: none;
    }
    .day-duration {
        position: absolute;
        bottom: 2px;
        right: 2px;
        font-size: 8px;
        color: #fff;
        background-color: rgba(0, 0, 0, 0.4);
        padding: 0 2px;
        border-radius: 4px;
        line-height: 1;
        font-weight: bold;
        z-index: 10;
    }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef } from 'react';
    import ReactDOM from 'react-dom/client';
    import { 
      Calendar as CalendarIcon, Dumbbell, BookOpen, TrendingUp, ChevronLeft, ChevronRight, 
      Plus, X, Info, Clock, Play, Pause, RotateCcw, CheckCircle2, Circle, ArrowLeft, 
      GripVertical, Music, Layers, CheckSquare, Timer, Feather, Download, Upload, FileJson,
      FolderHeart, Save, Trash2, Pencil, RefreshCw, Ruler, Share
    } from 'lucide-react';

    // --- 混合架构防变形趋势图 ---
    const TrendChart = ({ data, labels, color = "#3b82f6", label = "数据" }) => {
      const cleanData = data.map((d, i) => ({ val: Number(d), label: labels[i] }))
                            .filter(item => !isNaN(item.val) && item.val !== 0 && item.val !== null);

      if (cleanData.length < 2) return (
        <div className="h-40 flex flex-col items-center justify-center bg-gray-50 rounded-xl border border-dashed border-gray-200 text-gray-400 text-xs">
           <TrendingUp className="w-6 h-6 mb-1 opacity-20"/>
           <span>记录至少 2 天数据以生成趋势线</span>
        </div>
      );

      const values = cleanData.map(d => d.val);
      const max = Math.max(...values);
      const min = Math.min(...values);
      const range = max - min || 1;
      const padding = range * 0.1;
      const displayMin = min - padding;
      const displayRange = (max + padding) - displayMin;

      const points = cleanData.map((d, i) => {
        const x = (i / (cleanData.length - 1)) * 100;
        const y = 100 - ((d.val - displayMin) / displayRange) * 100;
        return `${x},${y}`;
      }).join(' ');

      const areaPoints = `${points} 100,100 0,100`;

      return (
        <div className="w-full bg-white p-4 pt-6 rounded-xl shadow-sm border border-gray-100 mb-6">
            <div className="flex justify-between items-center mb-6">
                <h3 className="font-bold text-gray-700">{label}</h3>
                <span className="text-xs font-bold px-2 py-1 rounded bg-gray-100 text-gray-500">最近 {cleanData.length} 次</span>
            </div>
            
            <div className="relative h-48 w-full">
                <div className="absolute inset-0 flex flex-col justify-between text-[10px] text-gray-300 pointer-events-none">
                    <div className="border-b border-gray-50 h-full w-full"></div>
                    <div className="border-b border-gray-50 h-full w-full"></div>
                    <div className="border-b border-gray-50 h-full w-full"></div>
                </div>

                <svg viewBox="0 0 100 100" preserveAspectRatio="none" className="absolute inset-0 w-full h-full overflow-visible z-0">
                    <defs>
                        <linearGradient id={`grad-${color}`} x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" stopColor={color} stopOpacity="0.2" />
                            <stop offset="100%" stopColor={color} stopOpacity="0" />
                        </linearGradient>
                    </defs>
                    <polygon points={areaPoints} fill={`url(#grad-${color})`} />
                    <polyline points={points} fill="none" stroke={color} strokeWidth="2" vectorEffect="non-scaling-stroke" strokeLinecap="round" strokeLinejoin="round" />
                </svg>

                {cleanData.map((d, i) => {
                    const left = (i / (cleanData.length - 1)) * 100;
                    const bottom = ((d.val - displayMin) / displayRange) * 100;
                    return (
                        <div key={i} className="absolute flex flex-col items-center group" style={{ left: `${left}%`, bottom: `${bottom}%`, transform: 'translate(-50%, 50%)' }}>
                            <span className="mb-2 text-[10px] font-bold text-gray-600 bg-white/80 px-1 rounded shadow-sm backdrop-blur-sm transform -translate-y-2">{d.val}</span>
                            <div className="w-3 h-3 bg-white border-2 rounded-full shadow-sm z-10 transition-transform group-hover:scale-125" style={{ borderColor: color }}></div>
                            <div className="absolute top-6 text-[9px] text-gray-400 whitespace-nowrap font-medium">{d.label}</div>
                        </div>
                    );
                })}
            </div>
            <div className="h-6"></div> 
        </div>
      );
    };

    // --- 初始数据 ---
    const INITIAL_EXERCISES = [
        { id: 801, name: '跑步机坡度走', part: '热身', maxWeight: '0', sets: '1', reps: '10min', note: '心率提升到120左右' },
        { id: 802, name: '肩关节环绕', part: '热身', maxWeight: '0', sets: '2', reps: '15', note: '活动肩袖' },
        { id: 101, name: '哑铃卧推', part: '胸部', maxWeight: '30', sets: '4', reps: '8-12', note: '' },
        { id: 102, name: '平板杠铃窄距卧推', part: '胸部', maxWeight: '60', sets: '4', reps: '8-12', note: '与肩同宽 下落到上腹部' },
        { id: 103, name: '窄距俯卧撑', part: '胸部', maxWeight: '0', sets: '4', reps: '力竭', note: '核心收紧' },
        { id: 104, name: '坐姿夹胸', part: '胸部', maxWeight: '40', sets: '4', reps: '12-15', note: '顶峰收缩' },
        { id: 201, name: '杠铃划船 / 坐姿划船', part: '背部', maxWeight: '60', sets: '4', reps: '10', note: '卧推握距' },
        { id: 202, name: '对握窄距高位下拉', part: '背部', maxWeight: '50', sets: '4', reps: '10-12', note: '肩宽或窄与肩' },
        { id: 203, name: '对握宽距高位下拉', part: '背部', maxWeight: '50', sets: '4', reps: '10-12', note: '卧推握距或宽与肩' },
        { id: 204, name: '直臂下压', part: '背部', maxWeight: '25', sets: '4', reps: '15', note: '感受背阔肌发力' },
        { id: 301, name: '哑铃提拉 (中后束)', part: '肩部', maxWeight: '15', sets: '4', reps: '12', note: '针对中后束' },
        { id: 302, name: '反向飞鸟 (后束)', part: '肩部', maxWeight: '10', sets: '4', reps: '15', note: '针对后束' },
        { id: 303, name: '哑铃提拉 (中束)', part: '肩部', maxWeight: '15', sets: '4', reps: '12', note: '针对中束' },
        { id: 304, name: '侧平举', part: '肩部', maxWeight: '10', sets: '6', reps: '15', note: '哑铃不要超过肩膀高度' },
        { id: 401, name: '哑铃窄距二头弯举', part: '手臂', maxWeight: '15', sets: '4', reps: '12', note: '🔥 超级组：建议与三头颈后臂屈伸连着做' },
        { id: 402, name: '三头颈后臂屈伸', part: '手臂', maxWeight: '20', sets: '4', reps: '12', note: '🔥 超级组：建议与二头弯举连着做' },
        { id: 403, name: '哑铃垂式弯举', part: '手臂', maxWeight: '15', sets: '4', reps: '12', note: '🔥 超级组：建议与平板凳臂屈伸连着做' },
        { id: 404, name: '平板凳坐姿臂屈伸', part: '手臂', maxWeight: '0', sets: '4', reps: '15', note: '腰背直立贴住凳子，直上直下，下落到大臂跟地面水平。🔥 建议与垂式弯举连着做' },
        { id: 501, name: '传统硬拉', part: '腿部', maxWeight: '100', sets: '5', reps: '5', note: '' },
        { id: 502, name: '负重箭步蹲', part: '腿部', maxWeight: '20', sets: '4', reps: '12', note: '箭步蹲站距：一次一个脚掌，下一次练腿两个脚掌，交替做。膝盖不要内扣' },
        { id: 503, name: '坐姿或俯身腿弯举', part: '腿部', maxWeight: '35', sets: '4', reps: '12', note: '' },
        { id: 504, name: '坐姿腿屈伸', part: '腿部', maxWeight: '40', sets: '4', reps: '12', note: '' },
        { id: 601, name: '波比跳 (Burpee)', part: '复合型', maxWeight: '0', sets: '4', reps: '15', note: '全身燃脂' },
        { id: 701, name: '绳索面拉 (Face Pull)', part: '体态纠正', maxWeight: '15', sets: '4', reps: '15', note: '改善圆肩' },
    ];
    
    const INITIAL_LOGS = {
        '2025-11-25': { status: 'trained', title: '初始记录', weight: 74.5, waist: 88, cardio: 0, duration: 1.0, exercises: [], note: '' },
        '2025-11-26': { status: 'trained', title: '恢复训练', weight: 74.0, waist: 87.5, cardio: 30, duration: 1.0, exercises: [], note: '' },
        '2025-11-27': { status: 'rest', title: '休息日', weight: 73.8, waist: 87, cardio: 0, duration: 0, exercises: [], note: '' },
        '2025-11-28': { status: 'trained', title: '胸部训练', weight: 73.5, waist: 86.5, cardio: 20, duration: 1.5, exercises: [{ id: 101, name: '哑铃卧推', sets: '4', reps: '8', weight: '30', completed: true }], note: '状态不错！' }
    };

    function App() {
      const [activeTab, setActiveTab] = useState('calendar'); 
      const [exercises, setExercises] = useState(() => { try { return JSON.parse(localStorage.getItem('ironlog_exercises')) || INITIAL_EXERCISES; } catch (e) { return INITIAL_EXERCISES; } });
      const [logs, setLogs] = useState(() => { try { return JSON.parse(localStorage.getItem('ironlog_logs')) || INITIAL_LOGS; } catch (e) { return INITIAL_LOGS; } });
      const [routines, setRoutines] = useState(() => { try { return JSON.parse(localStorage.getItem('ironlog_routines')) || []; } catch (e) { return []; } });
      const [selectedDate, setSelectedDate] = useState(new Date());
      const [currentMonth, setCurrentMonth] = useState(new Date());
      const [selectedForSession, setSelectedForSession] = useState([]);
      const [showTimer, setShowTimer] = useState(false);
      const [timerRunning, setTimerRunning] = useState(false);
      const [timeLeft, setTimeLeft] = useState(60); 
      const [totalTime, setTotalTime] = useState(60); 
      
      // 表单状态
      const [newExName, setNewExName] = useState('');
      const [newExPart, setNewExPart] = useState('胸部'); 
      const [newExMaxWeight, setNewExMaxWeight] = useState('');
      const [newExSets, setNewExSets] = useState('4');
      const [newExReps, setNewExReps] = useState('12');
      const [newExNote, setNewExNote] = useState('');
      const [showAddForm, setShowAddForm] = useState(false);
      const [editingId, setEditingId] = useState(null); 
      
      const fileInputRef = useRef(null);

      useEffect(() => { localStorage.setItem('ironlog_exercises', JSON.stringify(exercises)); }, [exercises]);
      useEffect(() => { localStorage.setItem('ironlog_logs', JSON.stringify(logs)); }, [logs]);
      useEffect(() => { localStorage.setItem('ironlog_routines', JSON.stringify(routines)); }, [routines]);

      useEffect(() => {
        let interval = null;
        if (timerRunning && timeLeft > 0) { interval = setInterval(() => setTimeLeft((t) => t - 1), 1000); } 
        else if (timeLeft === 0 && timerRunning) { setTimerRunning(false); if(navigator.vibrate) navigator.vibrate([200, 100, 200]); }
        return () => clearInterval(interval);
      }, [timerRunning, timeLeft]);

      const handleTimePreset = (newTime) => { setTotalTime(newTime); setTimeLeft(newTime); setTimerRunning(false); };
      const getDaysInMonth = (date) => ({ daysInMonth: new Date(date.getFullYear(), date.getMonth() + 1, 0).getDate(), firstDay: new Date(date.getFullYear(), date.getMonth(), 1).getDay() });
      const formatDateKey = (date) => date.toISOString().split('T')[0];
      const dateKey = formatDateKey(selectedDate);
      const currentLog = logs[dateKey] || { status: 'none', title: '', weight: '', waist: '', cardio: '', duration: '', exercises: [], note: '' };
      const updateLog = (field, value) => { setLogs(prev => ({ ...prev, [dateKey]: { ...currentLog, [field]: value } })); };
      const toggleStatus = (targetStatus) => { updateLog('status', currentLog.status === targetStatus ? 'none' : targetStatus); };

      const commitSelectionToDay = () => {
        if (selectedForSession.length === 0) return;
        const newExs = selectedForSession.map(id => {
          const master = exercises.find(e => e.id === id);
          if (!master) return null;
          return { id: master.id, name: master.name, sets: master.sets, reps: master.reps, weight: master.maxWeight, completed: false };
        }).filter(Boolean);
        updateLog('exercises', [...(currentLog.exercises || []), ...newExs]);
        if (currentLog.status !== 'trained') updateLog('status', 'trained');
        setSelectedForSession([]);
        setActiveTab('calendar');
      };

      const toggleSelection = (exId) => {
        if (selectedForSession.includes(exId)) setSelectedForSession(prev => prev.filter(id => id !== exId));
        else setSelectedForSession(prev => [...prev, exId]);
      };

      const toggleGroupSelection = (groupList) => {
        const groupIds = groupList.map(ex => ex.id);
        const allSelected = groupIds.every(id => selectedForSession.includes(id));
        setSelectedForSession(prev => allSelected ? prev.filter(id => !groupIds.includes(id)) : [...prev, ...groupIds.filter(id => !prev.includes(id))]);
      };

      // --- 组合功能 ---
      const handleSaveRoutine = () => {
        if (selectedForSession.length === 0) return;
        const name = prompt("给这个训练组合起个名字 (例如: 三分化-推胸日)");
        if (!name) return;
        setRoutines(prev => [...prev, { id: Date.now(), name, exerciseIds: [...selectedForSession] }]);
        alert(`组合 "${name}" 已保存！下次点击它即可一键选择。`);
      };
      const handleLoadRoutine = (routine) => { setSelectedForSession([...new Set([...selectedForSession, ...routine.exerciseIds])]); };
      const handleDeleteRoutine = (e, id) => { e.stopPropagation(); if(confirm('确定删除这个组合吗？')) setRoutines(prev => prev.filter(r => r.id !== id)); };
      
      const getGroupedExercises = () => {
        const groups = {};
        exercises.forEach(ex => { if (!groups[ex.part]) groups[ex.part] = []; groups[ex.part].push(ex); });
        return ['热身', '胸部', '背部', '肩部', '手臂', '腿部', '复合型', '体态纠正', '其他'].map(part => ({ part, list: groups[part] || [] })).filter(g => g.list.length > 0);
      };

      // --- 添加/编辑 动作逻辑 ---
      const handleSaveExercise = () => {
        if (!newExName || !newExPart || !newExSets || !newExReps) { alert('请填写完整信息！'); return; }
        
        if (editingId) {
            setExercises(prev => prev.map(ex => ex.id === editingId ? {
                ...ex,
                name: newExName, part: newExPart, maxWeight: newExMaxWeight || '0', sets: newExSets, reps: newExReps, note: newExNote
            } : ex));
            setEditingId(null);
        } else {
            setExercises(prev => [...prev, { id: Date.now(), name: newExName, part: newExPart, maxWeight: newExMaxWeight || '0', sets: newExSets, reps: newExReps, note: newExNote }]);
        }
        setShowAddForm(false); setNewExName(''); setNewExMaxWeight(''); setNewExNote('');
      };

      const handleEditExercise = (e, ex) => {
          e.stopPropagation(); 
          setNewExName(ex.name);
          setNewExPart(ex.part);
          setNewExMaxWeight(ex.maxWeight);
          setNewExSets(ex.sets);
          setNewExReps(ex.reps);
          setNewExNote(ex.note || '');
          setEditingId(ex.id);
          setShowAddForm(true);
      };

      const handleDeleteExercise = (e, id) => {
          e.stopPropagation(); 
          if(confirm('确定要删除这个动作吗？此操作不可恢复。')) {
              setExercises(prev => prev.filter(ex => ex.id !== id));
              setSelectedForSession(prev => prev.filter(sid => sid !== id));
          }
      };

      const handleDurationChange = (e) => { const value = parseFloat(e.target.value); updateLog('duration', isNaN(value) ? '' : value); }
      
      // --- 一键分享文本功能 ---
      const handleShareText = async () => {
        const dateStr = selectedDate.toLocaleDateString();
        const title = currentLog.title || '今日训练';
        const weight = currentLog.weight ? `⚖️ 体重: ${currentLog.weight}kg` : '';
        const waist = currentLog.waist ? `📏 腰围: ${currentLog.waist}cm` : '';
        const cardio = currentLog.cardio ? `🏃‍♂️ 有氧: ${currentLog.cardio}分钟` : '';
        const duration = currentLog.duration ? `⏱️ 时长: ${currentLog.duration}小时` : '';

        const stats = [weight, waist, cardio, duration].filter(Boolean).join(' | ');

        let exText = '';
        if (currentLog.exercises && currentLog.exercises.length > 0) {
            exText = '\n\n📋 今日动作:\n' + currentLog.exercises.map((ex, i) =>
                `${i + 1}. ${ex.name} - ${ex.sets}组 x ${ex.reps}次 @ ${ex.weight}kg`
            ).join('\n');
        } else {
            exText = '\n\n📋 今日动作: 无记录';
        }

        const noteText = currentLog.note ? `\n\n💡 训练心得:\n${currentLog.note}` : '';

        const shareText = `🏋️ Gyming 训练日志 | ${dateStr}\n📌 主题: ${title}\n${stats}${exText}${noteText}`;

        // 尝试调用系统原生分享 (适合添加到主屏幕的 PWA 或移动端浏览器)
        if (navigator.share) {
            try {
                await navigator.share({
                    title: 'Gyming 训练日志',
                    text: shareText
                });
            } catch (err) {
                // 用户取消分享或发生错误时，回退到剪贴板
                if (err.name !== 'AbortError') {
                    copyToClipboard(shareText);
                }
            }
        } else {
            // 不支持系统分享的设备，直接复制到剪贴板
            copyToClipboard(shareText);
        }
      };

      const copyToClipboard = (text) => {
          if (navigator.clipboard) {
              navigator.clipboard.writeText(text).then(() => {
                  alert('训练日志已复制到剪贴板，快去粘贴分享吧！');
              }).catch(() => {
                  alert('复制失败，请手动复制');
              });
          }
      };

      const exportData = () => {
        const blob = new Blob([JSON.stringify({ logs, exercises, routines }, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = `gyming_backup_${formatDateKey(new Date())}.json`; a.click(); URL.revokeObjectURL(url);
      };
      
      const importData = (e) => {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            try {
                const data = JSON.parse(event.target.result);
                if (data.logs && data.exercises) {
                    if(confirm(`包含 ${Object.keys(data.logs).length} 条记录。覆盖当前数据？`)) {
                        setLogs(data.logs); setExercises(data.exercises); if(data.routines) setRoutines(data.routines); alert('恢复成功！');
                    }
                } else alert('文件格式错误');
            } catch { alert('读取失败'); }
        };
        reader.readAsText(file);
      };

      const getChartData = () => {
        const sorted = Object.keys(logs).sort((a, b) => new Date(a) - new Date(b)).slice(-10);
        return { 
          dates: sorted.map(d => d.slice(5)), 
          weights: sorted.map(d => logs[d].weight), 
          waists: sorted.map(d => logs[d].waist),
          cardios: sorted.map(d => logs[d].cardio) 
        };
      };
      const chartData = getChartData();

      return (
        <div className="min-h-screen bg-gray-50 flex justify-center font-sans text-gray-800">
          <div className="w-full max-w-md bg-white h-screen shadow-2xl relative flex flex-col overflow-hidden">
            <div className="bg-gray-900 text-white p-4 pt-8 shrink-0 z-20 shadow-md flex justify-between items-center">
              <div><h1 className="text-xl font-bold flex items-center gap-2"><Dumbbell className="text-red-500" /> Gyming己酩健身日志</h1><p className="text-xs text-gray-400">塑造更强的自己</p></div>
              <button onClick={() => setShowTimer(!showTimer)} className={`flex items-center gap-2 px-4 py-2 rounded-xl font-bold transition-all shadow-lg ${timerRunning ? 'bg-red-500 text-white animate-pulse' : 'bg-gray-800 text-gray-200 border border-gray-700'}`}><Clock className={`w-5 h-5 ${timerRunning ? 'animate-spin' : ''}`} />{timerRunning ? `${timeLeft}s` : '休息'}</button>
            </div>

            {showTimer && (
              <div className="bg-gray-800 text-white p-5 border-b-4 border-red-500 shadow-2xl z-30 fixed top-[80px] w-full max-w-md">
                <div className="flex justify-between items-center mb-6">
                  <div><span className="text-xs text-gray-400 font-bold uppercase">Current Rest</span><div className={`text-5xl font-mono font-black ${timeLeft < 10 ? 'text-red-500' : ''}`}>{Math.floor(timeLeft / 60)}:{Math.floor(timeLeft % 60).toString().padStart(2, '0')}</div></div>
                  <div className="flex gap-3"><button onClick={() => setTimerRunning(!timerRunning)} className={`w-14 h-14 rounded-full flex items-center justify-center ${timerRunning ? 'bg-yellow-500 text-black' : 'bg-emerald-500 text-white'}`}>{timerRunning ? <Pause className="w-6 h-6"/> : <Play className="w-6 h-6 ml-1"/>}</button><button onClick={() => { setTimeLeft(totalTime); setTimerRunning(false); }} className="w-14 h-14 rounded-full bg-gray-700 text-white flex items-center justify-center"><RotateCcw className="w-6 h-6"/></button></div>
                </div>
                <div className="grid grid-cols-2 gap-3 mb-2">{[60, 90, 180, 300].map(sec => <button key={sec} onClick={() => handleTimePreset(sec)} className={`h-12 rounded-xl font-bold ${totalTime === sec ? 'bg-red-500 text-white' : 'bg-gray-700 text-gray-300'}`}>{sec >= 60 ? `${sec/60}m` : `${sec}s`}</button>)}</div>
              </div>
            )}

            <div className="flex-1 overflow-y-auto pb-24 no-scrollbar">
              {activeTab === 'calendar' && (
                <div className="p-4 space-y-6">
                  <div className="bg-white rounded-2xl shadow-sm border border-gray-100 p-4">
                    <div className="flex justify-between items-center mb-4">
                      <button onClick={() => setCurrentMonth(new Date(currentMonth.setMonth(currentMonth.getMonth() - 1)))}><ChevronLeft/></button>
                      <h2 className="font-bold text-lg">{currentMonth.getFullYear()}年 {currentMonth.getMonth() + 1}月</h2>
                      <button onClick={() => setCurrentMonth(new Date(currentMonth.setMonth(currentMonth.getMonth() + 1)))}><ChevronRight/></button>
                    </div>
                    <div className="grid grid-cols-7 gap-1 text-center mb-2">{['日','一','二','三','四','五','六'].map(d => <div key={d} className="text-xs text-gray-400">{d}</div>)}</div>
                    <div className="grid grid-cols-7 gap-2">
                      {Array(getDaysInMonth(currentMonth).firstDay).fill(null).map((_, i) => <div key={`e-${i}`}/>)}
                      {Array(getDaysInMonth(currentMonth).daysInMonth).fill(null).map((_, i) => {
                        const day = i + 1; const d = new Date(currentMonth.getFullYear(), currentMonth.getMonth(), day); const k = formatDateKey(d); const log = logs[k]; const isSelected = k === dateKey;
                        let cls = "text-gray-700 hover:bg-gray-100";
                        if (log?.status === 'trained') cls = "bg-red-500 text-white shadow-lg shadow-red-200 scale-105 font-bold";
                        else if (log?.status === 'rest') cls = "bg-emerald-400 text-white shadow-lg shadow-emerald-200 scale-105 font-bold";
                        else if (log?.status === 'deload') cls = "bg-orange-400 text-white shadow-lg shadow-orange-200 scale-105 font-bold";
                        return <button key={day} onClick={() => setSelectedDate(d)} className={`aspect-square rounded-full flex items-center justify-center text-sm transition-all relative ${cls} ${isSelected ? 'ring-2 ring-gray-900 ring-offset-2 z-10' : ''}`}>{day}{log?.duration && log.duration > 0 && <span className="day-duration">{log.duration}h</span>}</button>;
                      })}
                    </div>
                  </div>
                  <div className="bg-white rounded-2xl shadow-lg border border-gray-100 overflow-hidden min-h-[400px]">
                    <div className="bg-gray-50 p-4 border-b border-gray-100 flex justify-between items-center">
                      <div><span className="text-xs text-gray-400 uppercase tracking-wider">{selectedDate.toLocaleDateString()}</span><input type="text" placeholder="今日主题" className="block w-full bg-transparent font-bold text-lg outline-none" value={currentLog.title} onChange={(e) => updateLog('title', e.target.value)} /></div>
                      <div className="flex gap-2">
                        <button onClick={() => toggleStatus('trained')} className={`p-3 rounded-xl transition-all ${currentLog.status === 'trained' ? 'bg-red-500 text-white shadow-lg' : 'bg-gray-100 text-gray-400'}`}><Dumbbell className="w-5 h-5"/></button>
                        <button onClick={() => toggleStatus('rest')} className={`p-3 rounded-xl transition-all ${currentLog.status === 'rest' ? 'bg-emerald-400 text-white shadow-lg' : 'bg-gray-100 text-gray-400'}`}><CalendarIcon className="w-5 h-5"/></button>
                        <button onClick={() => toggleStatus('deload')} className={`p-3 rounded-xl transition-all ${currentLog.status === 'deload' ? 'bg-orange-400 text-white shadow-lg' : 'bg-gray-100 text-gray-400'}`}><Feather className="w-5 h-5"/></button>
                      </div>
                    </div>
                    <div className="p-4 space-y-4">
                      {/* 体重、腰围、有氧、时长 四个模块 */}
                      <div className="grid grid-cols-2 gap-3">
                        <div className="flex items-center gap-3 bg-blue-50 p-3 rounded-xl border border-blue-100"><div className="bg-blue-200 p-2 rounded-full text-blue-700"><TrendingUp className="w-4 h-4"/></div><div className="flex-1"><label className="text-[10px] text-blue-600 font-bold">体重</label><div className="flex items-baseline gap-1"><input type="number" step="0.1" placeholder="0.0" className="bg-transparent text-lg font-bold text-blue-900 outline-none w-full" value={currentLog.weight} onChange={(e) => updateLog('weight', e.target.value)} /><span className="text-[10px] text-blue-500 font-bold">KG</span></div></div></div>
                        <div className="flex items-center gap-3 bg-cyan-50 p-3 rounded-xl border border-cyan-100"><div className="bg-cyan-200 p-2 rounded-full text-cyan-700"><Ruler className="w-4 h-4"/></div><div className="flex-1"><label className="text-[10px] text-cyan-600 font-bold">腰围</label><div className="flex items-baseline gap-1"><input type="number" step="0.1" placeholder="0.0" className="bg-transparent text-lg font-bold text-cyan-900 outline-none w-full" value={currentLog.waist} onChange={(e) => updateLog('waist', e.target.value)} /><span className="text-[10px] text-cyan-500 font-bold">CM</span></div></div></div>
                        <div className="flex items-center gap-3 bg-orange-50 p-3 rounded-xl border border-orange-100"><div className="bg-orange-200 p-2 rounded-full text-orange-700"><Timer className="w-4 h-4"/></div><div className="flex-1"><label className="text-[10px] text-orange-600 font-bold">有氧</label><div className="flex items-baseline gap-1"><input type="number" placeholder="0" className="bg-transparent text-lg font-bold text-orange-900 outline-none w-full" value={currentLog.cardio} onChange={(e) => updateLog('cardio', e.target.value)} /><span className="text-[10px] text-orange-500 font-bold">Min</span></div></div></div>
                        <div className="flex items-center gap-3 bg-fuchsia-50 p-3 rounded-xl border border-fuchsia-100"><div className="bg-fuchsia-200 p-2 rounded-full text-fuchsia-700"><Clock className="w-4 h-4"/></div><div className="flex-1"><label className="text-[10px] text-fuchsia-600 font-bold">时长</label><div className="flex items-baseline gap-1"><input type="number" step="0.1" placeholder="0.0" className="bg-transparent text-lg font-bold text-fuchsia-900 outline-none w-full" value={currentLog.duration} onChange={handleDurationChange} /><span className="text-[10px] text-fuchsia-500 font-bold">Hrs</span></div></div></div>
                      </div>

                      <div>
                        {/* 新增了分享按钮 */}
                        <div className="flex justify-between items-center mb-3">
                            <h3 className="font-bold text-gray-700">今日安排</h3>
                            <div className="flex gap-2">
                                <button onClick={handleShareText} className="text-[10px] flex items-center gap-1 font-bold text-emerald-600 bg-emerald-50 px-3 py-1.5 rounded-full hover:bg-emerald-100 transition-colors active:scale-95"><Share className="w-3 h-3"/> 分享/复制</button>
                                <button onClick={() => setActiveTab('library')} className="text-[10px] flex items-center gap-1 font-bold text-indigo-600 bg-indigo-50 px-3 py-1.5 rounded-full hover:bg-indigo-100 transition-colors active:scale-95"><Plus className="w-3 h-3"/> 添加动作</button>
                            </div>
                        </div>
                        
                        {currentLog.exercises && currentLog.exercises.length > 0 ? (
                          <div className="space-y-3">{currentLog.exercises.map((item, index) => (<div key={index} className="bg-white border border-gray-100 rounded-xl p-3 shadow-sm hover:shadow-md transition-all"><div className="flex justify-between items-start mb-2"><div className="flex items-center gap-2"><div className="cursor-grab text-gray-300"><GripVertical className="w-4 h-4"/></div><span className="font-bold text-gray-800">{item.name}</span></div><button onClick={() => {const ex = [...currentLog.exercises]; ex.splice(index,1); updateLog('exercises', ex);}} className="text-gray-300 hover:text-red-500"><X className="w-4 h-4"/></button></div><div className="grid grid-cols-3 gap-2 text-sm pl-6">{['sets', 'reps', 'weight'].map(field => (<div key={field} className="bg-gray-50 rounded p-1.5"><span className="text-[10px] text-gray-400 capitalize">{field}</span><input type={field === 'weight' || field === 'reps' ? 'number' : 'text'} step={field === 'weight' ? '0.1' : '1'} className="bg-transparent font-bold w-full outline-none" value={item[field]} onChange={(e) => {const ex = [...currentLog.exercises]; ex[index][field] = e.target.value; updateLog('exercises', ex);}} /></div>))}</div></div>))}</div>
                        ) : <div className="text-center py-8 text-gray-400 text-sm bg-gray-50 rounded-lg border-2 border-dashed border-gray-200">点击上方按钮添加</div>}
                      </div>
                      
                      {/* 修复了心得无法绑定的问题 */}
                      <textarea placeholder="训练心得..." value={currentLog.note || ''} onChange={(e) => updateLog('note', e.target.value)} className="w-full text-sm bg-gray-50 p-3 rounded-xl outline-none h-24 border border-transparent focus:bg-white focus:border-gray-200" />
                    </div>
                  </div>
                </div>
              )}

              {activeTab === 'library' && (
                <div className="p-4 pb-32">
                  <div className="flex items-center gap-2 mb-4">
                    <button onClick={() => setActiveTab('calendar')} className="p-2 hover:bg-gray-100 rounded-full"><ArrowLeft className="w-5 h-5 text-gray-600"/></button>
                    <div><h2 className="text-2xl font-bold text-gray-800">动作库</h2><p className="text-sm text-gray-500">已选 {selectedForSession.length} 个动作</p></div>
                  </div>

                  <div className="mb-6">
                    <h3 className="text-sm font-bold text-gray-500 mb-2 flex items-center gap-1"><FolderHeart className="w-4 h-4"/> 我的训练预设 (点击即可选择)</h3>
                    <div className="flex gap-3 overflow-x-auto pb-2 no-scrollbar">
                      {routines.length === 0 && (
                         <div className="shrink-0 w-48 bg-gray-50 border-2 border-dashed border-indigo-200 rounded-xl p-3 flex flex-col items-center justify-center text-indigo-400 text-xs gap-1">
                            <span className="font-bold">👇 如何创建组合？</span>
                            <span>1. 在下方选中几个动作</span>
                            <span>2. 底部会出现“存为组合”按钮</span>
                         </div>
                      )}
                      {routines.map(routine => (
                        <div key={routine.id} onClick={() => handleLoadRoutine(routine)} className="shrink-0 w-32 bg-indigo-50 border border-indigo-100 rounded-xl p-3 relative hover:shadow-md transition-all cursor-pointer group active:scale-95">
                           <button onClick={(e) => handleDeleteRoutine(e, routine.id)} className="absolute top-1 right-1 text-indigo-300 hover:text-red-500 p-1"><Trash2 className="w-3 h-3"/></button>
                           <div className="font-bold text-indigo-900 text-sm truncate mb-1">{routine.name}</div>
                           <div className="text-[10px] text-indigo-500">{routine.exerciseIds.length} 个动作</div>
                        </div>
                      ))}
                    </div>
                  </div>
                  
                  <div className={`bg-white p-4 rounded-xl shadow-lg border border-indigo-100 mb-6 ${showAddForm ? 'block' : 'hidden'}`}>
                      <h3 className="font-bold text-indigo-700 mb-3 flex justify-between items-center">
                          {editingId ? '编辑动作' : '添加新动作'}
                          <button onClick={() => {setShowAddForm(false); setEditingId(null); setNewExName('');}} className="text-gray-400 hover:text-gray-600"><X className="w-4 h-4"/></button>
                      </h3>
                      <div className="space-y-3">
                          <input type="text" placeholder="动作名称" value={newExName} onChange={(e) => setNewExName(e.target.value)} className="w-full p-2 border border-gray-200 rounded-lg text-sm" />
                          <select value={newExPart} onChange={(e) => setNewExPart(e.target.value)} className="w-full p-2 border border-gray-200 rounded-lg text-sm">
                              {['热身', '胸部', '背部', '肩部', '手臂', '腿部', '复合型', '体态纠正', '其他'].map(part => <option key={part} value={part}>{part}</option>)}
                          </select>
                          <div className="grid grid-cols-3 gap-2"><input type="text" placeholder="组数" value={newExSets} onChange={(e) => setNewExSets(e.target.value)} className="p-2 border border-gray-200 rounded-lg text-sm" /><input type="text" placeholder="次数" value={newExReps} onChange={(e) => setNewExReps(e.target.value)} className="p-2 border border-gray-200 rounded-lg text-sm" /><input type="number" placeholder="重量" value={newExMaxWeight} onChange={(e) => setNewExMaxWeight(e.target.value)} className="p-2 border border-gray-200 rounded-lg text-sm" /></div>
                          <textarea placeholder="备注" value={newExNote} onChange={(e) => setNewExNote(e.target.value)} className="w-full p-2 border border-gray-200 rounded-lg text-sm h-16" />
                          <button onClick={handleSaveExercise} className={`w-full text-white p-2 rounded-lg font-bold transition-colors ${editingId ? 'bg-emerald-500 hover:bg-emerald-600' : 'bg-indigo-600 hover:bg-indigo-700'}`}>
                              {editingId ? '💾 保存修改' : '+ 添加到我的动作库'}
                          </button>
                      </div>
                  </div>
                  
                  <button onClick={() => {setShowAddForm(prev => !prev); setEditingId(null); setNewExName('');}} className={`w-full p-3 rounded-xl font-bold text-sm mb-4 transition-colors ${showAddForm ? 'bg-red-500 text-white' : 'bg-indigo-500 text-white hover:bg-indigo-600'}`}>{showAddForm ? '隐藏表单' : '+ 创建新动作'}</button>

                  <div className="space-y-6">
                    {getGroupedExercises().map(group => {
                      const groupIds = group.list.map(ex => ex.id);
                      const isAllSelected = groupIds.every(id => selectedForSession.includes(id));
                      return (
                        <div key={group.part}>
                          <div className="flex justify-between items-center mb-3 px-1"><div className="flex items-center gap-2"><div className="w-1 h-5 bg-red-500 rounded-full"/><h3 className="font-bold text-gray-700 text-lg">{group.part}</h3></div><button onClick={() => toggleGroupSelection(group.list)} className={`text-xs px-3 py-1.5 rounded-full font-bold flex gap-1 ${isAllSelected ? 'bg-indigo-100 text-indigo-700' : 'bg-gray-100 text-gray-500'}`}>{isAllSelected ? <CheckSquare className="w-3 h-3"/> : <Layers className="w-3 h-3"/>} {isAllSelected ? '已全选' : '全选'}</button></div>
                          <div className="grid gap-3">
                            {group.list.map(ex => {
                              const isSelected = selectedForSession.includes(ex.id);
                              return (
                                <div key={ex.id} className={`rounded-xl border cursor-pointer p-4 ${isSelected ? 'bg-indigo-50 border-indigo-500' : 'bg-white border-gray-100'}`} onClick={() => toggleSelection(ex.id)}>
                                  <div className="flex items-center justify-between">
                                      <div className="flex items-center gap-3">
                                          <div className={`w-10 h-10 rounded-full flex items-center justify-center font-bold ${isSelected ? 'bg-indigo-500 text-white' : 'bg-gray-100 text-gray-400'}`}>{isSelected ? <CheckCircle2 className="w-6 h-6"/> : ex.name[0]}</div>
                                          <div><h3 className={`font-bold ${isSelected ? 'text-indigo-900' : 'text-gray-800'}`}>{ex.name}</h3><span className="text-xs bg-gray-100 text-gray-500 px-2 py-0.5 rounded">{ex.sets}x{ex.reps}</span></div>
                                      </div>
                                      
                                      <div className="flex gap-1" onClick={(e) => e.stopPropagation()}>
                                          <button onClick={(e) => handleEditExercise(e, ex)} className="p-2 text-gray-300 hover:text-blue-500 bg-gray-50 rounded-lg"><Pencil className="w-4 h-4"/></button>
                                          <button onClick={(e) => handleDeleteExercise(e, ex.id)} className="p-2 text-gray-300 hover:text-red-500 bg-gray-50 rounded-lg"><Trash2 className="w-4 h-4"/></button>
                                      </div>
                                  </div>
                                  {ex.note && <div className="mt-2 text-xs text-gray-500">💡 {ex.note}</div>}
                                </div>
                              )
                            })}
                          </div>
                        </div>
                      )
                    })}
                  </div>
                  
                  {selectedForSession.length > 0 && (
                    <div className="fixed bottom-24 left-0 right-0 px-4 z-30 flex gap-2 justify-center">
                        <button onClick={handleSaveRoutine} className="bg-gray-800 text-white shadow-xl px-4 py-4 rounded-full font-bold flex items-center gap-2 transition-transform active:scale-95"><Save className="w-5 h-5"/> <span className="text-xs">存为组合</span></button>
                        <button onClick={commitSelectionToDay} className="flex-1 max-w-xs bg-indigo-600 text-white shadow-xl px-6 py-4 rounded-full font-bold flex items-center justify-center gap-2 transition-transform active:scale-95">确认添加 {selectedForSession.length} 个动作 <ChevronRight className="w-5 h-5"/></button>
                    </div>
                  )}
                </div>
              )}

              {activeTab === 'stats' && (
                <div className="p-4 space-y-6">
                  <h2 className="text-2xl font-bold text-gray-800">训练洞察</h2>
                  <TrendChart data={chartData.weights} labels={chartData.dates} label="体重趋势 (Weight / KG)" color="#3b82f6" />
                  <TrendChart data={chartData.waists} labels={chartData.dates} label="腰围尺寸 (Waist / CM)" color="#f97316" />
                  
                  <div className="bg-gray-800 text-white p-5 rounded-2xl shadow-lg mt-8">
                    <h3 className="font-bold mb-2 flex items-center gap-2"><FileJson className="w-5 h-5"/> 数据管理</h3><p className="text-xs text-gray-400 mb-4">手动导出/导入文件来同步数据。</p>
                    <div className="flex gap-3"><button onClick={exportData} className="flex-1 bg-indigo-500 hover:bg-indigo-600 py-3 rounded-lg font-bold text-sm flex items-center justify-center gap-2"><Download className="w-4 h-4"/> 导出备份</button><button onClick={() => fileInputRef.current.click()} className="flex-1 bg-gray-700 hover:bg-gray-600 py-3 rounded-lg font-bold text-sm flex items-center justify-center gap-2"><Upload className="w-4 h-4"/> 导入记录</button><input type="file" ref={fileInputRef} onChange={importData} className="hidden" accept=".json" /></div>
                  </div>
                </div>
              )}
            </div>

            <div className="w-full bg-white border-t border-gray-100 px-6 py-4 flex justify-between items-center z-20 shrink-0">
              <button onClick={() => setActiveTab('calendar')} className={`flex flex-col items-center gap-1 ${activeTab === 'calendar' ? 'text-gray-900' : 'text-gray-400'}`}><CalendarIcon className="w-6 h-6"/><span className="text-[10px] font-medium">日历</span></button>
              <button onClick={() => setActiveTab('library')} className={`flex flex-col items-center gap-1 ${activeTab === 'library' ? 'text-gray-900' : 'text-gray-400'}`}><BookOpen className="w-6 h-6"/><span className="text-[10px] font-medium">动作库</span></button>
              <button onClick={() => setActiveTab('stats')} className={`flex flex-col items-center gap-1 ${activeTab === 'stats' ? 'text-gray-900' : 'text-gray-400'}`}><TrendingUp className="w-6 h-6"/><span className="text-[10px] font-medium">洞察</span></button>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
